<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CryptoMike Personal Trader</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --border: #23232e;
  --border2: #2e2e3e;
  --text: #f0f0f5;
  --text2: #9090a8;
  --text3: #5a5a70;
  --accent: #c8f135;
  --accent2: #9bbc1a;
  --up: #4ade80;
  --down: #f87171;
  --warn: #fbbf24;
  --gold: #FFD700;
  --radius: 12px;
  --radius-sm: 8px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Grotesk', sans-serif;
  min-height: 100vh;
}

.header {
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: rgba(10, 10, 15, 0.97);
  backdrop-filter: blur(12px);
  z-index: 100;
}

.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 30px;
  height: 30px;
  background: var(--accent);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: 13px;
  color: #0a0a0f;
  font-family: 'Space Mono', monospace;
}

.logo-text {
  font-size: 14px;
  font-weight: 600;
}

.logo-sub {
  font-size: 10px;
  color: var(--text3);
  font-family: 'Space Mono', monospace;
}

.status-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--text3);
  display: inline-block;
  margin-right: 5px;
}

.status-dot.live {
  background: var(--up);
  box-shadow: 0 0 6px var(--up);
}

.status-text {
  font-size: 11px;
  color: var(--text3);
  font-family: 'Space Mono', monospace;
}

.main {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: calc(100vh - 61px);
}

.sidebar {
  border-right: 1px solid var(--border);
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  z-index: 90;
}

.content {
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.s-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  letter-spacing: .12em;
  text-transform: uppercase;
  padding: 16px 16px 8px;
}

.s-block {
  padding: 0 14px 14px;
  border-bottom: 1px solid var(--border);
}

.field {
  margin-bottom: 8px;
}

.field label {
  font-size: 10px;
  color: var(--text2);
  display: block;
  margin-bottom: 4px;
  font-family: 'Space Mono', monospace;
}

.field input, .field select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 7px 10px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  outline: none;
}

.field input:focus, .field select:focus {
  border-color: var(--accent);
}

.field input::placeholder {
  color: var(--text3);
}

.exchange-selector {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}

.exch-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 8px;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: 'Space Mono', monospace;
  color: var(--text3);
  text-align: center;
}

.exch-btn.active {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(200, 241, 53, .06);
}

.api-panel {
  display: none;
}

.api-panel.active {
  display: block;
}

.btn {
  width: 100%;
  padding: 8px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-size: 12px;
  font-weight: 600;
  font-family: 'Space Grotesk', sans-serif;
}

.btn-accent {
  background: var(--accent);
  color: #0a0a0f;
}

.btn-accent:hover {
  background: var(--accent2);
}

.btn-ghost {
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border2);
}

.btn-ghost:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.btn:disabled {
  opacity: .4;
  cursor: not-allowed;
}

.asset-card {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 10px 12px;
  margin-bottom: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.asset-card:hover, .asset-card.active {
  border-color: var(--accent);
  background: rgba(200, 241, 53, .04);
}

.asset-info {
  display: flex;
  align-items: center;
  gap: 8px;
}

.asset-dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  flex-shrink: 0;
}

.asset-symbol {
  font-size: 13px;
  font-weight: 600;
  font-family: 'Space Mono', monospace;
}

.asset-name {
  font-size: 10px;
  color: var(--text3);
}

.asset-price {
  font-size: 13px;
  font-weight: 600;
  font-family: 'Space Mono', monospace;
}

.asset-change {
  font-size: 10px;
  font-family: 'Space Mono', monospace;
}

.up { color: var(--up); }
.down { color: var(--down); }
.neutral { color: var(--text3); }

.cmd-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
}

.cmd-btn {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 7px 5px;
  cursor: pointer;
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: var(--text2);
  text-align: center;
}

.cmd-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.order-panel {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 8px;
}

.exec-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}

.exec-field label {
  font-size: 9px;
  color: var(--text3);
  display: block;
  margin-bottom: 3px;
  font-family: 'Space Mono', monospace;
}

.exec-field input {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 7px 8px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Space Mono', monospace;
  outline: none;
}

.exec-field input:focus {
  border-color: var(--accent);
}

.tp-multi-row {
  display: flex;
  gap: 4px;
  align-items: center;
  margin-bottom: 4px;
}

.tp-multi-row input.pct {
  width: 50px;
  text-align: center;
  background: rgba(200, 241, 53, .1);
  color: var(--accent);
  border-color: rgba(200, 241, 53, .3);
}

.exec-type-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
  margin-bottom: 10px;
}

.exec-type-btn {
  padding: 7px 4px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 10px;
  font-weight: 700;
  font-family: 'Space Mono', monospace;
  text-align: center;
  border: 1px solid var(--border2);
  background: var(--bg);
  color: var(--text3);
}

.exec-type-btn.sel-market {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(200, 241, 53, .08);
}

.exec-type-btn.sel-limit {
  border-color: #00aae4;
  color: #00aae4;
  background: rgba(0, 170, 228, .08);
}

.exec-btns {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.exec-btn-long {
  background: rgba(74, 222, 128, .15);
  color: var(--up);
  border: 1px solid rgba(74, 222, 128, .4);
  padding: 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 700;
}

.exec-btn-long:hover {
  background: rgba(74, 222, 128, .25);
}

.exec-btn-short {
  background: rgba(248, 113, 113, .15);
  color: var(--down);
  border: 1px solid rgba(248, 113, 113, .4);
  padding: 10px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: 700;
}

.exec-btn-short:hover {
  background: rgba(248, 113, 113, .25);
}

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.msg {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.msg-user {
  align-items: flex-end;
}

.msg-ai {
  align-items: flex-start;
}

.msg-label {
  font-size: 9px;
  color: var(--text3);
  font-family: 'Space Mono', monospace;
}

.msg-bubble-user {
  background: var(--accent);
  color: #0a0a0f;
  border-radius: var(--radius) var(--radius) 4px var(--radius);
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 500;
}

.signal-card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  overflow: hidden;
}

.signal-header {
  padding: 14px 18px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border2);
  display: flex;
  justify-content: space-between;
}

.signal-asset {
  font-size: 16px;
  font-weight: 700;
  font-family: 'Space Mono', monospace;
}

.signal-badge {
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  font-weight: 600;
  font-family: 'Space Mono', monospace;
}

.badge-long {
  background: rgba(74, 222, 128, .2);
  color: var(--up);
  border: 1px solid rgba(74, 222, 128, .4);
}

.badge-short {
  background: rgba(248, 113, 113, .2);
  color: var(--down);
  border: 1px solid rgba(248, 113, 113, .4);
}

.signal-body {
  padding: 16px 18px;
}

.input-area {
  border-top: 1px solid var(--border);
  padding: 14px 20px;
  background: var(--bg);
}

.input-row {
  display: flex;
  gap: 8px;
}

.input-wrap {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 0 14px;
}

.input-wrap input {
  width: 100%;
  background: none;
  border: none;
  color: var(--text);
  font-size: 13px;
  padding: 12px 0;
  outline: none;
}

.send-btn {
  width: 42px;
  height: 42px;
  background: var(--accent);
  border: none;
  border-radius: var(--radius-sm);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.toast {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  padding: 9px 14px;
  font-size: 12px;
  opacity: 0;
  transition: all .2s;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
}

.toast.success {
  border-color: var(--up);
  color: var(--up);
}

.toast.error {
  border-color: var(--down);
  color: var(--down);
}

.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  padding: 0 14px;
}

.tab {
  font-size: 11px;
  padding: 10px 12px;
  cursor: pointer;
  color: var(--text3);
  border-bottom: 2px solid transparent;
  font-family: 'Space Mono', monospace;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-panel {
  display: none;
}

.tab-panel.active {
  display: block;
}

/* RESPONSIVE DESIGN PARA MÓVIL */
@media (max-width: 768px) {
  .main { 
    display: flex; 
    flex-direction: column; 
    height: auto; 
  }
  .sidebar { 
    border-right: none; 
    border-bottom: 1px solid var(--border); 
    max-height: 45vh; 
  }
  .content { 
    height: 55vh; 
  }
  .exec-grid { 
    grid-template-columns: 1fr 1fr; 
  }
  .header { 
    padding: 10px 15px; 
  }
  .logo-text { 
    display: none; 
  }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">
    <div class="logo-mark">CM</div>
    <div>
      <div class="logo-text">CryptoMike Trader</div>
      <div class="logo-sub">uso personal · móvil y multi-tp</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;">
    <div>
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">sin conectar</span>
    </div>
  </div>
</header>

<div class="main">
  <aside class="sidebar">
    <div class="tabs">
      <div class="tab active" onclick="sideTab(this,'tab-config')">Config</div>
      <div class="tab" onclick="sideTab(this,'tab-analisis')">Comandos</div>
      <div class="tab" onclick="sideTab(this,'tab-posiciones')">Posiciones</div>
    </div>

    <div id="tab-config" class="tab-panel active">
      <div class="s-block" style="padding-top:10px;">
        <div class="field">
          <label>TELEGRAM CHAT ID (Alertas)</label>
          <input type="text" id="telegramId" placeholder="Ej: 828991968" />
        </div>
        <div class="field">
          <label>ANTHROPIC API KEY</label>
          <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
        </div>
        <div class="exchange-selector">
          <div class="exch-btn active" id="btnBitunix" onclick="selectExchange('bitunix')">Bitunix</div>
          <div class="exch-btn" id="btnBitmart" onclick="selectExchange('bitmart')">BitMart</div>
        </div>
        <div class="api-panel active" id="panel-bitunix">
          <div class="field"><input type="password" id="bitunixKey" placeholder="API Key..." /></div>
          <div class="field"><input type="password" id="bitunixSecret" placeholder="Secret Key..." /></div>
        </div>
        <div class="api-panel" id="panel-bitmart">
          <div class="field"><input type="password" id="bitmartKey" placeholder="API Key..." /></div>
          <div class="field"><input type="password" id="bitmartSecret" placeholder="Secret Key..." /></div>
          <div class="field"><input type="text" id="bitmartMemo" placeholder="Memo..." /></div>
        </div>
        <button class="btn btn-accent" onclick="conectar()">Conectar Sistema</button>
      </div>
    </div>

    <div id="tab-analisis" class="tab-panel">
      <div class="s-block" style="padding-top:10px;">
        <div class="cmd-grid">
          <div class="cmd-btn" onclick="sendCmd('ANALIZA BTC')">ANALIZA BTC</div>
          <div class="cmd-btn" onclick="sendCmd('ANALIZA ETH')">ANALIZA ETH</div>
          <div class="cmd-btn" onclick="sendCmd('ANALIZA SOL')">ANALIZA SOL</div>
        </div>
      </div>
    </div>

    <div id="tab-posiciones" class="tab-panel">

        Sin posiciones abiertas

  <div class="content">
    <div class="chat-area" id="chatArea"></div>
    <div class="input-area">
      <div class="input-row">
        <div class="input-wrap">
          <input type="text" id="userInput" placeholder="Ej: ANALIZA BTC" onkeydown="if(event.key==='Enter')enviar()" />
        </div>
        <button class="send-btn" id="sendBtn" onclick="enviar()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var RENDER_SERVER = 'https://cryptomike-server.onrender.com';
var conversationHistory = [];
var prices = {};
var priceInterval = null;
var activeExchange = 'bitunix';

// Utilidades para leer valores de inputs
function getVal(id) { 
  var el = document.getElementById(id); 
  return el && el.value ? parseFloat(el.value.replace(/,/g, '.')) : 0; 
}

function getStr(id) { 
  var el = document.getElementById(id); 
  return el ? el.value.trim() : ''; 
}

// Selector de exchange visual
function selectExchange(ex) {
  activeExchange = ex;
  ['bitunix', 'bitmart'].forEach(function(e) {
    document.getElementById('btn' + e.charAt(0).toUpperCase() + e.slice(1)).classList.toggle('active', e === ex);
    document.getElementById('panel-' + e).classList.toggle('active', e === ex);
  });
}

// Cambio de pestañas en la barra lateral
function sideTab(el, panelId) {
  document.querySelectorAll('.tab').forEach(function(t) { 
    t.classList.remove('active'); 
  });
  document.querySelectorAll('.tab-panel').forEach(function(p) { 
    p.classList.remove('active'); 
  });
  el.classList.add('active');
  document.getElementById(panelId).classList.add('active');
}

// Conectar e iniciar bucle de precios
function conectar() {
  document.getElementById('statusDot').classList.add('live');
  document.getElementById('statusText').textContent = 'Live';
  showToast('Conectado', 'success');
  if (priceInterval) {
    clearInterval(priceInterval);
  }
  priceInterval = setInterval(fetchPrices, 15000);
}

// Actualizar precios en vivo desde Binance
function fetchPrices() {
  Object.keys(prices).forEach(function(sym) {
    fetch('https://api.binance.com/api/v3/ticker/price?symbol=' + sym + 'USDT')
      .then(r => r.json())
      .then(d => {
        if(d.price) {
          prices[sym] = parseFloat(d.price);
          document.querySelectorAll('.live-entry-' + sym).forEach(function(input) {
             var execPanel = input.closest('.signal-execute');
             if (execPanel && execPanel.querySelector('.sel-market')) {
               input.value = prices[sym].toFixed(5);
             }
          });
        }
      });
  });
}

// Enviar comandos rápidos
function sendCmd(cmd) { 
  document.getElementById('userInput').value = cmd; 
  enviar(); 
}

// Procesar input del usuario
function enviar() {
  var input = document.getElementById('userInput');
  var msg = input.value.trim();
  if (!msg) return; 
  
  input.value = '';
  
  var parts = msg.split(' ');
  if (['ANALIZA', 'SETUP'].includes(parts[0].toUpperCase()) && parts.length >= 2) {
    var sym = parts[1].toUpperCase();
    fetch('https://api.binance.com/api/v3/ticker/price?symbol=' + sym + 'USDT')
      .then(r => r.json())
      .then(d => {
        if(d.price) { 
          prices[sym] = parseFloat(d.price); 
          msg = parts[0] + ' ' + sym + ' $' + d.price; 
        }
        enviarMensaje(msg);
      }).catch(() => enviarMensaje(msg));
  } else { 
    enviarMensaje(msg); 
  }
}

// Parsear la respuesta de Claude
function parsearSenal(text) {
  var norm = text.replace(/\*/g, '');
  var data = { 
    asset: null, price: null, entry: null, sl: null, 
    tp1: null, tp2: null, tp3: null, 
    p1: 100, p2: 0, p3: 0, 
    direction: null, action: 'ESPERAR' 
  };

  var m = norm.match(/ANALISIS\s+([A-Z]+).*?\$([\d.,]+)/i);
  if (m) { 
    data.asset = m[1]; 
    data.price = parseFloat(m[2].replace(/,/g, '.')); 
    prices[data.asset] = data.price; 
  }

  if (/\bLONG\b|COMPRAR/i.test(norm)) { 
    data.direction = 'LONG'; 
    data.action = 'COMPRAR'; 
  } else if (/\bSHORT\b|VENDER/i.test(norm)) { 
    data.direction = 'SHORT'; 
    data.action = 'VENDER'; 
  }

  var getNum = (regex) => { 
    var mt = norm.match(regex); 
    return mt ? parseFloat(mt[1].replace(/,/g, '.')) : null; 
  };
  
  data.entry = getNum(/[Ee]ntrada[:\s]+\$?([\d.,]+)/);
  data.sl = getNum(/Stop\s*Loss[:\s]+\$?([\d.,]+)/i) || getNum(/SL[:\s]+\$?([\d.,]+)/i);
  data.tp1 = getNum(/TP1[:\s]+\$?([\d.,]+)/i);
  data.tp2 = getNum(/TP2[:\s]+\$?([\d.,]+)/i);
  data.tp3 = getNum(/TP3[:\s]+\$?([\d.,]+)/i);

  // Extraer porcentajes de los TP
  var gest = norm.match(/Gestion.*?(?:(\d+)%\s*TP1).*?(?:(\d+)%\s*TP2)?.*?(?:(\d+)%\s*TP3)?/i);
  if (gest) {
    data.p1 = parseInt(gest[1]) || 100;
    data.p2 = parseInt(gest[2]) || 0;
    data.p3 = parseInt(gest[3]) || 0;
  }

  return data;
}

// Construir la tarjeta visual de la orden
function buildSignalCard(text, senal) {
  if (!senal.asset) return null;
  
  var sym = senal.asset;
  var uid = 'card_' + Date.now();
  var pAct = prices[sym] || senal.price || 0;
  var ent = senal.entry || pAct;
  
  var formatInp = (n) => n ? parseFloat(Number(n).toFixed(5)).toString() : '';

  var tpHtml = `
    <div class="exec-field">
      <label>TP1 $</label>
      <div class="tp-multi-row">
        <input type="text" id="exec-tp1-${uid}" value="${formatInp(senal.tp1)}"/>
        <input type="number" id="exec-p1-${uid}" class="pct" value="${senal.p1}"/>
      </div>
    </div>`;
    
  if (senal.tp2) {
    tpHtml += `
      <div class="exec-field">
        <label>TP2 $</label>
        <div class="tp-multi-row">
          <input type="text" id="exec-tp2-${uid}" value="${formatInp(senal.tp2)}"/>
          <input type="number" id="exec-p2-${uid}" class="pct" value="${senal.p2}"/>
        </div>
      </div>`;
  }
  
  if (senal.tp3) {
    tpHtml += `
      <div class="exec-field">
        <label>TP3 $</label>
        <div class="tp-multi-row">
          <input type="text" id="exec-tp3-${uid}" value="${formatInp(senal.tp3)}"/>
          <input type="number" id="exec-p3-${uid}" class="pct" value="${senal.p3}"/>
        </div>
      </div>`;
  }

  var html = `
  <div class="signal-card">
    <div class="signal-header">
      <span class="signal-asset">${sym}/USDT</span>
      <span class="signal-badge ${senal.direction === 'LONG' ? 'badge-long' : 'badge-short'}">${senal.action}</span>
    </div>
    <div class="signal-execute">
      <div class="exec-grid">
        <div class="exec-field">
          <label>USDT TOT.</label>
          <input type="number" id="exec-usdt-${uid}" placeholder="Ej: 50" />
        </div>
        <div class="exec-field">
          <label>ENTRADA $</label>
          <input type="text" id="exec-entry-${uid}" class="live-entry-${sym}" value="${formatInp(ent)}" />
        </div>
        <div class="exec-field">
          <label>APAL.</label>
          <input type="number" id="exec-lev-${uid}" value="10" />
        </div>
        <div class="exec-field">
          <label>SL $</label>
          <input type="text" id="exec-sl-${uid}" value="${formatInp(senal.sl)}" />
        </div>
      </div>
      
      <div class="exec-grid" style="grid-template-columns:1fr; gap:2px;">
        ${tpHtml}
      </div>
      
      <div class="exec-type-row" id="exec-types-${uid}">
        <div class="exec-type-btn sel-market" id="exec-market-${uid}" onclick="setOT('${sym}','${uid}','market')">MERCADO</div>
        <div class="exec-type-btn" id="exec-limit-${uid}" onclick="setOT('${sym}','${uid}','limit')">LIMITE</div>
      </div>
      
      <div class="exec-btns">
        <button class="exec-btn-long" onclick="ejecutar('${sym}','${uid}','LONG')">▲ ENTRAR LONG</button>
        <button class="exec-btn-short" onclick="ejecutar('${sym}','${uid}','SHORT')">▼ ENTRAR SHORT</button>
      </div>
    </div>
  </div>`;
  
  return html;
}

// Cambiar tipo de orden visualmente
function setOT(sym, uid, type) {
  document.getElementById('exec-market-' + uid).classList.remove('sel-market');
  document.getElementById('exec-limit-' + uid).classList.remove('sel-limit');
  document.getElementById('exec-' + type + '-' + uid).classList.add('sel-' + type);
  
  if (type === 'market' && prices[sym]) {
    document.getElementById('exec-entry-' + uid).value = prices[sym].toFixed(5);
  }
}

// Ejecutar la orden Multi-TP
function ejecutar(sym, uid, side) {
  var usdt = getVal('exec-usdt-' + uid);
  var entry = getVal('exec-entry-' + uid);
  var sl = getVal('exec-sl-' + uid);
  var lev = getVal('exec-lev-' + uid);
  var teleId = getStr('telegramId');

  var tps = [];
  [1, 2, 3].forEach(i => {
    var pr = getVal('exec-tp' + i + '-' + uid);
    var pc = getVal('exec-p' + i + '-' + uid);
    if (pr > 0 && pc > 0) {
      tps.push({ price: pr, pct: pc });
    }
  });

  if (!usdt || usdt <= 0) return showToast('Introduce la cantidad USDT', 'error');
  if (tps.length === 0) return showToast('Introduce al menos un TP', 'error');

  var ot = document.getElementById('exec-market-' + uid).classList.contains('sel-market') ? 'market' : 'limit';
  
  var payload = {
    apiKey: getStr(activeExchange + 'Key'),
    secret: getStr(activeExchange + 'Secret'),
    memo: getStr('bitmartMemo'),
    exchange: activeExchange,
    symbol: sym, 
    side: side, 
    orderType: ot, 
    usdt: usdt, 
    leverage: lev, 
    entryPrice: entry, 
    sl: sl, 
    tps: tps,
    telegramId: teleId
  };

  showToast('Procesando Multi-TP...', '');
  
  fetch(RENDER_SERVER + '/multi-order', { 
    method: 'POST', 
    headers: {'Content-Type': 'application/json'}, 
    body: JSON.stringify(payload) 
  })
  .then(r => r.json())
  .then(res => {
     if (res.success) {
       showToast('Ordenes enviadas OK', 'success');
     } else {
       showToast('Error: ' + res.error, 'error');
     }
  })
  .catch(e => showToast('Error de red', 'error'));
}

// Comunicacion con Anthropic Claude
function enviarMensaje(msg) {
  var ak = document.getElementById('anthropicKey').value.trim();
  if (!ak) return showToast('Introduce Anthropic API Key', 'error');
  
  var chat = document.getElementById('chatArea');
  chat.innerHTML += `<div class="msg msg-user"><div class="msg-bubble-user">${msg}</div></div>`;
  
  var sp = 'Eres CryptoAdvisor. Analiza CUALQUIER criptomoneda. Metodologia SMC. \n\nREGLA: Usa punto para decimales. Indica gestion de TPs así: "Gestion: 40% TP1 30% TP2 30% TP3".\n\nREGLAS DE COHERENCIA:\n1. SHORT: SL MAYOR que Entrada. TPs MENORES que Entrada.\n2. LONG: SL MENOR que Entrada. TPs MAYORES que Entrada.\n\nFORMATO:\nANALISIS [ACTIVO] | $[PRECIO]\n[...resto del analisis...]\nEntrada: $[precio]\nStop Loss: $[precio]\nTP1: $[precio]\nTP2: $[precio]\nTP3: $[precio]\nGestion: [X]% TP1 [Y]% TP2 [Z]% TP3\nAccion: COMPRAR/VENDER/ESPERAR';

  conversationHistory.push({ role: 'user', content: msg });
  
  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST', 
    headers: { 
      'Content-Type': 'application/json', 
      'x-api-key': ak, 
      'anthropic-version': '2023-06-01', 
      'anthropic-dangerous-direct-browser-access': 'true' 
    },
    body: JSON.stringify({ 
      model: 'claude-haiku-4-5', 
      max_tokens: 1500, 
      system: sp, 
      messages: conversationHistory 
    })
  })
  .then(r => r.json())
  .then(data => {
    var reply = data.content[0].text;
    conversationHistory.push({ role: 'assistant', content: reply });
    
    var senal = parsearSenal(reply);
    var card = buildSignalCard(reply, senal);
    
    if (card) {
      chat.innerHTML += `<div class="msg msg-ai">${card}</div>`;
    } else {
      chat.innerHTML += `<div class="msg msg-ai"><div class="msg-plain">${reply}</div></div>`;
    }
    
    chat.scrollTop = chat.scrollHeight;
  });
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; 
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}
